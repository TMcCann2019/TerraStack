<!DOCTYPE html>
<html>
<head>
    <title>Yard Work Quotes</title>
</head>
<body>
    <h1>TerraStack Yard Work Quotes</h1>
    <form id="quote-form">
        <label for="sqft">Yard Square Footage:</label>
        <input type="number" id="sqft" name="sqft" required>
        <button type="submit">Get Quote</button>
    </form>
    <div id="quote-result"></div>

    <script>
        const form = document.getElementById('quote-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const sqft = document.getElementById('sqft').value;
            const resDiv = document.getElementById('quote-result');
            resDiv.innerHTML = 'Loading...';
            try {
                const response = await fetch('/get-yard-quote', {
                    method: 'POST',
                    body: new URLSearchParams({sqft})
                });
                const data = await response.json();
                if(data.error) {
                    resDiv.innerHTML = 'Error: ' + data.error;
                } else {
                    resDiv.innerHTML = `
                    Quote: ${data.quote}<br>
                    Author: ${data.author}<br>
                    Yard Size: ${data.sqft} sqft<br>
                    Estimated Cost: $${data.estimated_price}
                    `;
                }
            } catch(err) {
                resDiv.innerHTML = 'Error fetching quote';
            }
        });
    </script>
</body>
</html>
