apiVersion: apps/v1
kind: Deployment
metadata:
  name: terrastack-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terrastack-nginx
  template:
    metadata:
      labels:
        app: terrastack-nginx
    spec:
      containers:
      - name: nginx
        image: {{ .Values.nginx.image }}
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: terrastack-nginx
spec:
  type: NodePort
  selector:
    app: terrastack-nginx
  ports:
    - port: 80
      nodePort: 30007