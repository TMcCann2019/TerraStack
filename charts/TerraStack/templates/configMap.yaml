---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb
  namespace: terrastack
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS `quotes` (
      `id` int(11) NOT NULL AUTO_INCREMENT,
      `quote` text NOT NULL,
      `author` varchar(255) DEFAULT NULL,
      PRIMARY KEY (`id`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;