apiVersion: v1
kind: ConfigMap
metadata:
  name: terrastack-config
  namespace: {{ .Release.Namespace }}
data:
  # Frontend
  BACKEND_URL: "http://api-svc.{{ .Release.Namespace }}.svc.cluster.local:8081"

  # Backend / API
  DB_HOST: "db-svc.{{ .Release.Namespace }}.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "terrastack"
  # DB_USER and DB_PASSWORD come from the Secret (database-secret)