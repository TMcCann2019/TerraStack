apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: terrastack
  name: model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model
  template:
    metadata:
      labels:
        app: model
    spec:
      containers:
        - name: model
          image: api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  namespace: terrastack
  name: model-svc
spec:
  selector:
    app: model
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP