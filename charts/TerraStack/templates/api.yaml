apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: terrastack
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: terrastack-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  namespace: terrastack
  name: model-svc
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP