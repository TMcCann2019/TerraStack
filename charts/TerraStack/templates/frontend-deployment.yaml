apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: terrastack
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}
          ports:
            - containerPort: {{ .Values.service.frontend.port }}
          envFrom:
            - configMapRef:
                name: terrastack-config