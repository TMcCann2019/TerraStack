apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: terrastack
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: terrastack-frontend:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: backend_url
          value: "https://backend-svc.terrastack.svc.cluster.local:8000"