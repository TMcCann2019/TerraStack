apiVersion: apps/v1
kind: Deployment
metadata:
  name: terrastack-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terrastack-frontend
  template:
    metadata:
      labels:
        app: terrastack-frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.frontend.image }}
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: terrastack-frontend
spec:
  selector:
    app: terrastack-frontend
  ports:
    - port: 5000