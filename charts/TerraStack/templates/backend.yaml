apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: terrastack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8000
        env:
          - name: model_url
            value: http://model-svc.terrastack.svc.cluster.local:8081
          - name: DB_HOST
            value: database-svc.terrastack.svc.cluster.local
          - name: DB_PORT
            value: "3306"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: database-secret
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: database-secret
                key: password
          - name: DB_NAME
            value: terrastack-db